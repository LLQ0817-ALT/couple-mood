<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>情侣心情小屋</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:system-ui;}
body{min-height:100vh;background:linear-gradient(135deg,#ffd6e0,#fff2f6);padding:20px;}
.container{max-width:480px;margin:0 auto;}
.box{background:rgba(255,255,255,0.85);border-radius:22px;padding:24px;margin-bottom:16px;box-shadow:0 6px 24px rgba(230,120,160,0.15);}
h2{text-align:center;color:#c84b78;margin-bottom:20px;font-size:22px}
input{width:100%;padding:14px 16px;border:1px solid #f0c2d2;border-radius:14px;font-size:18px;outline:none;margin-bottom:16px}
.btn{width:100%;padding:15px;border:none;border-radius:14px;font-size:17px;font-weight:bold;color:#fff;background:#e86892;margin:8px 0;}
.btn:active{opacity:0.85;}
.btn-gray{background:#b8b8b8}
.role-wrap{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin:16px 0}
.role-card{padding:20px;text-align:center;border-radius:16px;border:2px solid transparent;background:#fff}
.role-card.active{border-color:#e86892;background:#fff0f5}
.emoji-buttons{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin-top:16px}
.mood-btn{padding:14px;border-radius:12px;border:1px solid #eed0dd;background:#fff;font-size:15px}
.mood-btn.active{background:#ffd6e0;border-color:#e86892;outline:2px solid #000;}
.page{display:none;}
.page.active{display:block;}
.other-mood{text-align:center;padding:16px;background:#fff;border-radius:16px;margin-bottom:16px}
.emo-big{font-size:60px;margin:8px 0}
.loading{color:#888;text-align:center;margin:10px 0;}
.suggest-box{margin-top:16px;padding:16px;background:#fff0f5;border-radius:16px;display:none;}
.suggest-box h4{color:#c84b78;margin-bottom:8px;}
.suggest-box p{color:#666;line-height:1.7;}
</style>
</head>
<body>
<div class="container">
    <!-- 房间输入页 -->
    <div id="page-room" class="page active">
        <div class="box">
            <h2>进入情侣心情房间</h2>
            <input id="roomInput" placeholder="输入房间暗号（两人保持一致）">
            <div class="role-wrap">
                <div class="role-card" data-role="girl">👩 女生</div>
                <div class="role-card" data-role="boy">👨 男生</div>
            </div>
            <button class="btn" id="enterBtn">进入房间</button>
        </div>
    </div>

    <!-- 主页面 -->
    <div id="page-main" class="page">
        <div class="box other-mood">
            <div class="emo-big" id="otherEmo">❓</div>
            <h3>对方当前心情</h3>
            <p id="otherText">对方还未选择心情</p>
            <div class="suggest-box" id="suggestPanel">
                <h4>💡建议怎么做</h4>
                <p id="suggestText"></p>
            </div>
        </div>

        <div class="box">
            <h2>选择我的心情</h2>
            <div class="emoji-buttons" id="moodWrap">
                <!-- 按钮由JS动态生成，男女不同 -->
            </div>
            <div class="loading" id="syncText">同步完成</div>
            <button class="btn btn-gray" id="exitBtn" style="margin-top:20px;">退出房间</button>
        </div>
    </div>
</div>

<script>
const BASE_URL = "https://couple-mood.pages.dev";

let roomId = "";
let myRole = "";
let pollTimer = null;

// ========== 情绪配置：男女各自选项 ==========
const moodList = {
    girl: [
        {val:"来姨妈了",emo:"😤"},
        {val:"生气",emo:"😠"},
        {val:"好困",emo:"😴"},
        {val:"想你了",emo:"🥰"},
        {val:"肚子饿",emo:"🍔"},
        {val:"追剧",emo:"📺"},
        {val:"无聊",emo:"😐"},
        {val:"想出门",emo:"🚶"}
    ],
    boy: [
        {val:"烦躁",emo:"😤"},
        {val:"压力大",emo:"😔"},
        {val:"累了",emo:"😴"},
        {val:"想你了",emo:"🥰"},
        {val:"饿了",emo:"🍔"},
        {val:"打游戏中",emo:"🎮"},
        {val:"无聊",emo:"😐"},
        {val:"开心",emo:"😃"}
    ]
};

// 表情总映射
const emoMap = {};
// 应对方案（你可以随时修改文案）
const solutionMap = {
    "烦躁":"先安静抱抱对方，耐心倾听，不要讲道理；等情绪平复之后好好沟通。",
    "来姨妈了":"先关心肚子痛不痛，准备好温水，点个好吃的，在准备个暖宝宝，主动承担家务。",
    "生气":"先稳住情绪，主动安抚，耐心倾听，顺着对方些，跟自己有关的直接转账。",
    "压力大":"多给予鼓励，陪伴对方歇一会，主动分担琐事，不要催促。",
    "累了":"让对方好好休息，准备温水，安静陪伴，减少打扰。",
    "想你了":"及时回应思念，抽空视频或者见面，多表达我也想你。",
    "肚子饿":"询问想吃什么，给她点外卖、准备小吃，或者给她钱。",
     "饿了":"询问想吃什么，让他多吃点，也可以跟他一起拼单。",
    "追剧":"不频繁打扰，在旁要安静点，非要聊天就多点耐心或者陪她一起看。",
    "打游戏中":"不随意打扰，约定好结束时间，打完之后好好聊天。",
    "无聊":"一起看剧、打球、玩游戏、聊天，或者规划短途小事打发时间。",
    "想出门":"商量想去的地方，安排好行程，给她买新衣服，美美出片。",
    "开心":"一起分享喜悦，多多夸赞对方，留住好心情。"
};

// 角色选择
document.querySelectorAll(".role-card").forEach(card=>{
    card.onclick = ()=>{
        document.querySelectorAll(".role-card").forEach(c=>c.classList.remove("active"));
        card.classList.add("active");
        myRole = card.dataset.role;
    }
})

// 根据身份渲染对应的情绪按钮
function renderMoodButtons(){
    const wrap = document.getElementById("moodWrap");
    wrap.innerHTML = "";
    const list = moodList[myRole];
    list.forEach(item=>{
        const btn = document.createElement("button");
        btn.className = "mood-btn";
        btn.dataset.val = item.val;
        btn.innerHTML = `${item.emo} ${item.val}`;
        btn.onclick = async ()=>{
            const moodVal = btn.dataset.val;
            document.querySelectorAll(".mood-btn").forEach(b=>b.classList.remove("active"));
            btn.classList.add("active");
            document.getElementById("syncText").innerText = "同步中...";
            try{
                const res = await fetch(`${BASE_URL}/api/store?room=${roomId}&role=${myRole}`,{
                    method:"POST",
                    headers:{"Content-Type":"application/json"},
                    body:JSON.stringify({mood:moodVal}),
                    signal:AbortSignal.timeout(6000)
                });
                if(res.ok){
                    document.getElementById("syncText").innerText = "同步完成";
                }else{
                    document.getElementById("syncText").innerText = "同步失败，请检查网络";
                }
            }catch(err){
                document.getElementById("syncText").innerText = "同步超时，网络不通";
            }
        }
        wrap.appendChild(btn);
    })
}

// 进入房间
document.getElementById("enterBtn").onclick = async ()=>{
    roomId = document.getElementById("roomInput").value.trim();
    if(!roomId || !myRole){
        alert("请填写房间暗号并选择你的身份");
        return;
    }
    document.getElementById("page-room").classList.remove("active");
    document.getElementById("page-main").classList.add("active");
    renderMoodButtons();
    startPoll();
}

// 退出房间
document.getElementById("exitBtn").onclick = ()=>{
    stopPoll();
    document.getElementById("page-main").classList.remove("active");
    document.getElementById("page-room").classList.add("active");
    document.querySelectorAll(".role-card").forEach(c=>c.classList.remove("active"));
    document.getElementById("suggestPanel").style.display = "none";
    roomId = "";
    myRole = "";
}

// 轮询获取对方心情
function startPoll(){
    if(pollTimer) clearInterval(pollTimer);
    pollTimer = setInterval(fetchOtherMood, 2500);
    fetchOtherMood();
}
function stopPoll(){
    if(pollTimer){
        clearInterval(pollTimer);
        pollTimer = null;
    }
}
async function fetchOtherMood(){
    const otherRole = myRole === "girl" ? "boy" : "girl";
    try{
        const resp = await fetch(`${BASE_URL}/api/store?room=${roomId}&role=${otherRole}`,{
            signal:AbortSignal.timeout(5000)
        });
        const data = await resp.json();
        if(data && data.mood){
            // 自动匹配表情
            let emo = "❓";
            const allMoods = [...moodList.girl, ...moodList.boy];
            const find = allMoods.find(x=>x.val === data.mood);
            if(find) emo = find.emo;

            document.getElementById("otherEmo").innerText = emo;
            document.getElementById("otherText").innerText = data.mood;
            document.getElementById("suggestPanel").style.display = "block";
            document.getElementById("suggestText").innerText = solutionMap[data.mood];
        }else{
            document.getElementById("otherEmo").innerText = "❓";
            document.getElementById("otherText").innerText = "对方还未选择心情";
            document.getElementById("suggestPanel").style.display = "none";
        }
    }catch(e){
    }
}
</script>
</body>
</html>
